<!DOCTYPE html>
<html>
<head>
  <title>App - Budget Baddie</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🏡 Your Budget Room</h1>

  <button onclick="logout()">Logout</button>

  <!-- 🖼 ROOM -->
  <div class="card">
    <h2>Your Room</h2>
    <img src="https://i.imgur.com/2DhmtJ4.png" width="100%">
  </div>

  <!-- 💰 BUDGET -->
  <div class="card">
    <h2>Budget</h2>
    <input id="income" placeholder="Income">
    <button onclick="setBudget()">Set</button>

    <p>Income: <span id="incomeText">-</span></p>
    <p>Spent: <span id="spentText">-</span></p>
    <p>Remaining: <span id="remainingText">-</span></p>
  </div>

  <!-- 💸 EXPENSE -->
  <div class="card">
    <h2>Add Expense</h2>
    <input id="amount" placeholder="Amount">
    <input id="category" placeholder="Category">
    <input id="date" type="date">
    <button onclick="addExpense()">Add</button>
  </div>

</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

async function setBudget() {
  await fetch("http://127.0.0.1:8000/budget", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ income: parseInt(income.value) })
  });

  loadBudget();
}

async function addExpense() {
  await fetch("http://127.0.0.1:8000/expenses", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      amount: parseInt(amount.value),
      category_name: category.value,
      date: date.value
    })
  });

  loadBudget();
}

async function loadBudget() {
  const res = await fetch("http://127.0.0.1:8000/budget/remaining", {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  incomeText.textContent = data.income;
  spentText.textContent = data.total_spent;
  remainingText.textContent = data.remaining;
}

loadBudget();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Budget Baddie</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    .hidden { display: none; }
    .card { margin-bottom: 20px; }
  </style>
</head>

<body>

  <h1>Budget Baddie 💰</h1>

  <!-- 🔐 AUTH SECTION -->
  <div id="authSection">

    <h2>Sign Up</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signUp()">Sign Up</button>

    <hr>

    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

  </div>

  <!-- 🏠 APP SECTION -->
  <div id="appSection" class="hidden">

    <p id="userEmail"></p>
    <button onclick="logout()">Logout</button>

    <hr>

    <!-- 💰 SET BUDGET -->
    <div class="card">
      <h2>Set Budget</h2>
      <input id="income" placeholder="Income">
      <button onclick="setBudget()">Set Budget</button>
    </div>

    <!-- 💸 ADD EXPENSE -->
    <div class="card">
      <h2>Add Expense</h2>
      <input id="amount" placeholder="Amount">
      <input id="category" placeholder="Category">
      <input id="date" type="date">
      <button onclick="addExpense()">Add Expense</button>
    </div>

    <!-- 📊 BUDGET DISPLAY -->
    <div class="card">
      <h2>Your Budget</h2>
      <button onclick="checkBudget()">Refresh</button>

      <p><b>Income:</b> <span id="incomeText">-</span></p>
      <p><b>Spent:</b> <span id="spentText">-</span></p>
      <p><b>Remaining:</b> <span id="remainingText">-</span></p>
    </div>

  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKY1pPnizluRzTfUPv5ecXdJUc9MgvDDU",
      authDomain: "budget-baddie.firebaseapp.com",
      projectId: "budget-baddie",
      storageBucket: "budget-baddie.firebasestorage.app",
      messagingSenderId: "418344382176",
      appId: "1:418344382176:web:dbfca4dee2804cea75ea85"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 🔐 UI SWITCH
    function showApp(email) {
      document.getElementById("authSection").classList.add("hidden");
      document.getElementById("appSection").classList.remove("hidden");
      document.getElementById("userEmail").textContent = "Logged in as: " + email;
    }

    function showAuth() {
      document.getElementById("authSection").classList.remove("hidden");
      document.getElementById("appSection").classList.add("hidden");
    }

    // 🔐 SIGN UP
    window.signUp = async function () {
      const email = emailInput.value;
      const password = passwordInput.value;

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Signup successful!");
      } catch (e) {
        alert(e.message);
      }
    };

    // 🔑 LOGIN
    window.login = async function () {
      const email = loginEmail.value;
      const password = loginPassword.value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const token = await userCredential.user.getIdToken();

        localStorage.setItem("token", token);

        await fetch("http://127.0.0.1:8000/users/sync", {
          method: "POST",
          headers: { "Authorization": "Bearer " + token }
        });

        showApp(email);
        checkBudget();

      } catch (e) {
        alert(e.message);
      }
    };

    // 🚪 LOGOUT
    window.logout = async function () {
      await signOut(auth);
      localStorage.removeItem("token");
      showAuth();
    };

    // 💰 SET BUDGET
    window.setBudget = async function () {
      const token = localStorage.getItem("token");

      await fetch("http://127.0.0.1:8000/budget", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          income: parseInt(income.value)
        })
      });

      alert("Budget updated!");
      checkBudget();
    };

    // 💸 ADD EXPENSE
    window.addExpense = async function () {
      const token = localStorage.getItem("token");

      await fetch("http://127.0.0.1:8000/expenses", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          amount: parseInt(amount.value),
          category_name: category.value,
          date: date.value
        })
      });

      alert("Expense added!");
      checkBudget();
    };

    // 📊 CHECK BUDGET
    window.checkBudget = async function () {
      const token = localStorage.getItem("token");

      const res = await fetch("http://127.0.0.1:8000/budget/remaining", {
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();

      if (data.error) {
        alert(data.error);
        return;
      }

      incomeText.textContent = data.income;
      spentText.textContent = data.total_spent;
      remainingText.textContent = data.remaining;
    };

    // 🔁 AUTO LOGIN IF TOKEN EXISTS
    window.onload = function () {
      const token = localStorage.getItem("token");
      if (token) {
        showApp("Welcome back");
        checkBudget();
      }
    };

  </script>

</body>
</html>

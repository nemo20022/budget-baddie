<!DOCTYPE html>
<html>
<head>
  <title>Budget Baddie</title>
</head>

<body>

  <h1>Budget Baddie 💰</h1>

  <!-- 🔐 SIGN UP -->
  <h2>Sign Up</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signUp()">Sign Up</button>

  <hr>

  <!-- 🔑 LOGIN -->
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <hr>

  <!-- 💰 SET BUDGET -->
  <h2>Set Budget</h2>
  <input id="income" placeholder="Income">
  <button onclick="setBudget()">Set Budget</button>

  <hr>

  <!-- 💸 ADD EXPENSE -->
  <h2>Add Expense</h2>
  <input id="amount" placeholder="Amount">
  <input id="category" placeholder="Category">
  <input id="date" type="date">
  <button onclick="addExpense()">Add Expense</button>

  <hr>

  <!-- 📊 CHECK BUDGET -->
  <h2>Check Remaining Budget</h2>
  <button onclick="checkBudget()">Check</button>

  <pre id="result"></pre>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKY1pPnizluRzTfUPv5ecXdJUc9MgvDDU",
      authDomain: "budget-baddie.firebaseapp.com",
      projectId: "budget-baddie",
      storageBucket: "budget-baddie.firebasestorage.app",
      messagingSenderId: "418344382176",
      appId: "1:418344382176:web:dbfca4dee2804cea75ea85"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 🔐 SIGN UP
    window.signUp = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Signup successful!");
      } catch (error) {
        alert(error.message);
      }
    };

    // 🔑 LOGIN
    window.login = async function () {
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const token = await userCredential.user.getIdToken();

        localStorage.setItem("token", token);

        // 🔥 sync user to backend
        await fetch("http://127.0.0.1:8000/users/sync", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        alert("Login successful!");

      } catch (error) {
        alert(error.message);
      }
    };

    // 💰 SET BUDGET
    window.setBudget = async function () {
      const income = document.getElementById("income").value;
      const token = localStorage.getItem("token");

      if (!token) {
        alert("Login first!");
        return;
      }

      await fetch("http://127.0.0.1:8000/budget", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          income: parseInt(income)
        })
      });

      alert("Budget set!");
    };

    // 💸 ADD EXPENSE
    window.addExpense = async function () {
      const amount = document.getElementById("amount").value;
      const category = document.getElementById("category").value;
      const date = document.getElementById("date").value;

      const token = localStorage.getItem("token");

      if (!token) {
        alert("Login first!");
        return;
      }

      await fetch("http://127.0.0.1:8000/expenses", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          amount: parseInt(amount),
          category_name: category,
          date: date
        })
      });

      alert("Expense added!");
    };

    // 📊 CHECK BUDGET
    window.checkBudget = async function () {
      const token = localStorage.getItem("token");

      if (!token) {
        alert("Please login first!");
        return;
      }

      const response = await fetch("http://127.0.0.1:8000/budget/remaining", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const data = await response.json();

      document.getElementById("result").textContent =
        JSON.stringify(data, null, 2);
    };

  </script>

</body>
</html>
